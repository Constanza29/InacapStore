<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InacapStore - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/logo.png" alt="Logo InacapStore" class="logo-navbar">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="catalogo.html">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="mb-4 fw-bold">Nuestro Catálogo</h2>
        
        <div class="row g-4">
            
            <div class="col-12 col-lg-8">
                <div class="row g-4" id="contenedor-productos">
                    </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card shadow-sm carrito-responsivo">
                    <div class="card-body">
                        <h4 class="card-title fw-bold">Carrito de Compras</h4>
                        <div class="table-responsive">
                            <table class="table table-sm mt-3">
                                <thead>
                                    <tr>
                                        <th>Producto</th>
                                        <th>Cant.</th>
                                        <th>Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody id="cuerpo-carrito">
                                    </tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-between mt-3">
                            <h5 class="fw-bold">Total:</h5>
                            <h5 class="fw-bold text-success" id="total-carrito">$0</h5>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">&copy; 2026 InacapStore. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/init.js"></script>
    <script src="js/catalogo.js"></script>
</body>
</html>
