<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InacapStore - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/logo.png" alt="Logo InacapStore" class="logo-navbar" style="height: 40px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="menu-navegacion">
                    </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="mb-4 fw-bold">Nuestro Catálogo</h2>
        
        <div class="card p-3 shadow-sm border-0 mb-4 bg-light">
            <div class="row g-3 align-items-end">
                <div class="col-12 col-md-5">
                    <label for="filtro-categoria" class="form-label fw-bold small text-secondary">CATEGORÍA</label>
                    <select id="filtro-categoria" class="form-select">
                        </select>
                </div>
                <div class="col-12 col-md-7">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="filtro-precio" class="form-label fw-bold small text-secondary mb-0">PRECIO MÁXIMO</label>
                        <span id="precio-max-txt" class="badge bg-primary fs-6 fw-bold">$0</span>
                    </div>
                    <input type="range" class="form-range" id="filtro-precio" min="0" value="0">
                    <div class="d-flex justify-content-between text-muted extra-small" style="font-size: 0.8rem;">
                        <span>$0</span>
                        <span id="rango-limite-txt">$0</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="alerta-carrito" class="mb-3"></div>

        <div class="row g-4 align-items-start">
            
            <div class="col-12 col-lg-8">
                <div class="row g-4" id="contenedor-productos">
                    </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card shadow-sm border-0 carrito-responsivo p-2">
                    <div class="card-body">
                        <h4 class="card-title fw-bold mb-3 text-dark">Carrito de Compras</h4>
                        <div class="table-responsive">
                            <table class="table table-sm align-middle">
                                <thead>
                                    <tr class="text-secondary small">
                                        <th>Producto</th>
                                        <th class="text-center">Cant.</th>
                                        <th class="text-end">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody id="cuerpo-carrito">
                                    </tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-between mt-3 border-top pt-3">
                            <h5 class="fw-bold text-dark">Total:</h5>
                            <h5 class="fw-bold text-success fs-4" id="total-carrito">$0</h5>
                        </div>

                        <div class="row g-2 mt-3">
                            <div class="col-6">
                                <button id="btn-vaciar" class="btn btn-outline-danger btn-sm w-100 fw-bold py-2">Vaciar</button>
                            </div>
                            <div class="col-6">
                                <button id="btn-comprar" class="btn btn-success btn-sm w-100 fw-bold py-2">Comprar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 InacapStore. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/init.js"></script>
    <script src="js/catalogo.js"></script>
</body>
</html>
