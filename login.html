<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InacapStore - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/logo.png" alt="Logo InacapStore" class="logo-navbar" style="height: 40px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="menu-navegacion">
                    </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 420px;">
            <h3 class="text-center fw-bold mb-4">Iniciar Sesión</h3>
            
            <div id="alerta-login" class="mb-3"></div>

            <form id="form-login" novalidate>
                <div class="mb-3">
                    <label for="login-correo" class="form-label fw-semibold">Correo electrónico</label>
                    <input type="email" class="form-control" id="login-correo" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" id="login-password" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">Iniciar sesión</button>
            </form>

            <div class="text-center mt-4">
                <a href="registro.html" class="text-decoration-none text-secondary small">¿No tienes una cuenta? Regístrate aquí.</a>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 InacapStore. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/init.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
