<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InacapStore - Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="assets/logo.png" alt="Logo InacapStore" class="logo-navbar">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto" id="menu-navegacion">
                </ul>
        </div>
    </div>
</nav>

    <main class="container py-5">
        <h2 class="mb-4 fw-bold text-center">Contáctanos</h2>
        
        <div class="row g-4">
            
            <div class="col-md-6 order-1 order-md-2">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form id="form-contacto">
                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-semibold">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label for="correo" class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="correo" placeholder="nombre@ejemplo.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="mensaje" class="form-label fw-semibold">Mensaje</label>
                                <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribe tu consulta aquí..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Enviar Mensaje</button>
                        </form>
                        <div id="alerta-contacto" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 order-2 order-md-1">
                <h4 class="mb-3">Información de la Tienda</h4>
                <p><strong>📍 Dirección:</strong> Av. Ficticia 1234, Santiago, Chile.</p>
                <p><strong>📞 Teléfono:</strong> +56 9 1234 5678</p>
                <p><strong>✉️ Correo:</strong> contacto@inacapstore.cl</p>
                
                <div class="mt-4 ratio ratio-16x9 rounded shadow-sm overflow-hidden" style="max-height: 250px;">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d13313.684128038758!2d-70.6504502!3d-33.4372!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2scl!4v1624320000000!5m2!1ses!2scl" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">© 2026 InacapStore. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/init.js"></script>
    <script src="js/contacto.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/init.js"></script>
    
    <script src="js/catalogo.js"></script>
</body>
</body>
</html>
